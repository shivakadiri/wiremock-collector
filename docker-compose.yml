services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: collector
      POSTGRES_PASSWORD: collector
      POSTGRES_DB: wiremock_collector
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collector -d wiremock_collector"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://collector:collector@db:5432/wiremock_collector
      COLLECT_INTERVAL_SECONDS: "15"
      STATIC_DIR: /app/static
      CORS_ORIGINS: http://localhost:8000,http://localhost:5173
      DOCKER_SOCKET: /var/run/docker.sock
      DOCKER_HOST_GATEWAY: host.docker.internal
      DOCKER_AUTO_DISCOVER_ON_STARTUP: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
